name: monitor

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    # every 5 hours — each tick replaces the prior run via concurrency below
    - cron: '0 */5 * * *'

concurrency:
  group: monitor
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: python -m playwright install --with-deps chromium

      # State persists across runs so a fresh process doesn't silently
      # baseline URLs that flipped to in_stock during the cancel→restart
      # gap. Each run writes a uniquely-keyed cache; the next run's
      # restore-keys prefix match picks up the most recent.
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: coolshop-state-${{ github.run_id }}
          restore-keys: |
            coolshop-state-

      - env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python monitor.py

      # if: always() ensures state is saved even when the job is canceled
      # by the next cron tick (cancel-in-progress). monitor.py also writes
      # state.json after every URL check, so the file on disk is current.
      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: coolshop-state-${{ github.run_id }}
